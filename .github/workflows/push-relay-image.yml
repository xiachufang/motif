name: push-relay-image

# Build the author-operated APNs push relay image (deploy/push-relay/Dockerfile)
# and push it to GHCR.
#
# Registry: ghcr.io/<owner>/motif-push-relay, authenticated with the built-in
# GITHUB_TOKEN (packages: write) -- no extra secrets.

on:
  push:
    branches: [main]
    paths:
      - 'crates/motif-push-relay/**'
      - 'deploy/push-relay/**'
      - '.github/workflows/push-relay-image.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: push-relay-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/motif-push-relay

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: on a git tag -> :<tag>; on main -> :latest; always a
      # :sha-<short> for traceability.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Build into the local docker so we can health-check before publishing.
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/push-relay/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          TAG=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          KEY_DIR=$(mktemp -d)
          trap 'docker rm -f push-relay-smoke >/dev/null 2>&1 || true; rm -rf "$KEY_DIR"' EXIT

          openssl ecparam -name prime256v1 -genkey -noout -out "$KEY_DIR/ec.pem"
          openssl pkcs8 -topk8 -nocrypt -in "$KEY_DIR/ec.pem" -out "$KEY_DIR/apns.p8"
          chmod 0444 "$KEY_DIR/apns.p8"

          docker run -d --name push-relay-smoke -p 127.0.0.1:8088:8088 \
            -v "$KEY_DIR/apns.p8:/run/secrets/apns-sandbox.p8:ro" \
            -v "$KEY_DIR/apns.p8:/run/secrets/apns-production.p8:ro" \
            -e APNS_SANDBOX_KEY_PATH=/run/secrets/apns-sandbox.p8 \
            -e APNS_SANDBOX_KEY_ID=SANDBOXK1 \
            -e APNS_PRODUCTION_KEY_PATH=/run/secrets/apns-production.p8 \
            -e APNS_PRODUCTION_KEY_ID=PRODKEY22 \
            -e APNS_TEAM_ID=UWNR93L682 \
            -e APNS_TOPIC=io.allsunday.motif \
            "$TAG"

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/healthz >/tmp/push-relay-health.txt; then
              break
            fi
            sleep 1
          done
          docker ps --filter name=push-relay-smoke --format '{{.Status}}' | grep -q Up \
            || { echo "container exited"; docker logs push-relay-smoke; exit 1; }
          grep -qx 'ok' /tmp/push-relay-health.txt
          docker rm -f push-relay-smoke

      # Re-run the build (gha-cached -> near-instant) and push now it passed.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/push-relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
