name: release-macos-signed

# Independent of Xcode Cloud: build an arm64 app, sign every code object with
# Developer ID Application + Hardened Runtime, sign and notarize the DMG, and
# staple the ticket. The distinct suffix avoids racing Xcode Cloud's asset.
on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: release-macos-signed-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-version:
    uses: ./.github/workflows/version-check.yml

  build-sign-notarize:
    needs: check-version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@1.95
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # The Makefile imports both signing and notarization credentials into one
      # temporary keychain and owns the complete release lifecycle.
      - name: Build signed and notarized macOS release
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: make release-flutter-macos

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          # run_id / run_attempt are safe for branch names containing `/` and
          # keep repeated validation runs distinct.
          name: Motif-macos-${{ github.run_id }}-${{ github.run_attempt }}-notarized
          path: dist/release/Motif-*-notarized.dmg
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/release/Motif-*-notarized.dmg
          fail_on_unmatched_files: true
