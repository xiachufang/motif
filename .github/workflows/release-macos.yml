name: release-macos-signed

# Independent of Xcode Cloud: build an arm64 app, sign every code object with
# Developer ID Application + Hardened Runtime, notarize the DMG, and staple the
# ticket. The distinct asset suffix avoids racing Xcode Cloud's Motif-v*.dmg.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: release-macos-signed-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-version:
    uses: ./.github/workflows/version-check.yml

  build-sign-notarize:
    needs: check-version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@1.95
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Validate signing secrets
        env:
          P12: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          for value in "$P12" "$P12_PASSWORD" "$API_KEY_ID" "$API_ISSUER_ID" "$API_PRIVATE_KEY"; do
            if [[ -z "$value" ]]; then
              echo "A required macOS signing/notarization secret is missing." >&2
              exit 1
            fi
          done

      # Prebuild native dependencies so Xcode's sandboxed Flutter build hook
      # does not need to download Rust, Go, or Zig dependencies.
      - name: Prepare native dependencies
        working-directory: apps/flutter
        run: |
          (cd ghostty && zig build -Demit-lib-vt=true --fetch)
          bash scripts/build_motif_embed.sh --target macos-arm64
          bash scripts/build_tailscale.sh --target macos-arm64

      - name: Configure Flutter macOS build
        working-directory: apps/flutter
        run: |
          flutter pub get
          version_line="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          version="${version_line%%+*}"
          build_number="${version_line##*+}"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          flutter build macos \
            -t lib/main_desktop.dart \
            --config-only \
            --release \
            --build-name "$version" \
            --build-number "$build_number" \
            --no-pub

      # Build without a distribution identity, then sign the completed bundle
      # explicitly below. This avoids Xcode choosing an Apple Development cert.
      - name: Archive unsigned app
        run: |
          archive="$RUNNER_TEMP/Motif.xcarchive"
          rm -rf "$archive"
          xcodebuild \
            -project apps/flutter/macos/Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$archive" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            archive
          app="$archive/Products/Applications/Motif.app"
          test -d "$app"
          echo "APP_PATH=$app" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/motif-signing.keychain-db"
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain_password="$(uuidgen)"
          printf '%s' "$P12_BASE64" | openssl base64 -d -A -out "$certificate"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"

          identity="$(security find-identity -v -p codesigning "$keychain" \
            | awk '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$identity" ]]; then
            echo "The P12 does not contain a valid Developer ID Application identity." >&2
            security find-identity -v -p codesigning "$keychain"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$keychain" >> "$GITHUB_ENV"

      - name: Sign app with Hardened Runtime
        run: |
          sign() {
            codesign --force --sign "$SIGNING_IDENTITY" \
              --keychain "$SIGNING_KEYCHAIN" \
              --options runtime --timestamp "$1"
          }

          # Sign leaf Mach-O files first, then their enclosing bundles.
          while IFS= read -r -d '' file; do
            if file -b "$file" | grep -q 'Mach-O'; then
              sign "$file"
            fi
          done < <(find "$APP_PATH/Contents" -type f -print0)

          while IFS= read -r -d '' bundle; do
            sign "$bundle"
          done < <(find "$APP_PATH/Contents" -depth -type d \
            \( -name '*.framework' -o -name '*.app' -o -name '*.appex' -o -name '*.xpc' \) \
            -print0)

          codesign --force --sign "$SIGNING_IDENTITY" \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime --timestamp \
            --entitlements apps/flutter/macos/Runner/Release.entitlements \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH"

      - name: Create DMG
        run: |
          release_label="${GITHUB_REF_NAME}"
          if [[ "$release_label" != v* ]]; then
            release_label="v${APP_VERSION}"
          fi
          output_dir="$RUNNER_TEMP/motif-release"
          staging="$RUNNER_TEMP/motif-dmg"
          rm -rf "$output_dir" "$staging"
          mkdir -p "$output_dir" "$staging"
          ditto "$APP_PATH" "$staging/Motif.app"
          ln -s /Applications "$staging/Applications"
          dmg="$output_dir/Motif-${release_label}-notarized.dmg"
          hdiutil create -volname Motif -srcfolder "$staging" \
            -ov -format UDZO "$dmg"
          echo "DMG_PATH=$dmg" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          api_key="$RUNNER_TEMP/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "$API_PRIVATE_KEY_BASE64" | openssl base64 -d -A -out "$api_key"
          chmod 600 "$api_key"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$api_key" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature \
            --verbose=2 "$DMG_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Motif-${{ github.ref_name }}-notarized
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.DMG_PATH }}
          fail_on_unmatched_files: true

      - name: Remove temporary signing material
        if: always()
        run: |
          if [[ -n "${SIGNING_KEYCHAIN:-}" && -f "$SIGNING_KEYCHAIN" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8
