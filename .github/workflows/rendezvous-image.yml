name: rendezvous-image

# Build the standalone motif-rendezvous relay image (deploy/rendezvous/Dockerfile)
# and push it to GHCR. Pure Rust — no Zig/Go — so this is a quick build.
#
# Registry: ghcr.io/<owner>/motif-rendezvous, authenticated with the built-in
# GITHUB_TOKEN (packages: write) — no extra secrets.

on:
  push:
    branches: [main]
    paths:
      - 'crates/motif-rendezvous/**'
      - 'deploy/rendezvous/**'
      - '.github/workflows/rendezvous-image.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: rendezvous-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/motif-rendezvous

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Protocol tests
        run: cargo test -p motif-rendezvous -p motif-net

      # Tags: on a git tag → :<tag> + :latest; on main → :latest; always a
      # :sha-<short> for traceability.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Build into the local docker so we can pair-test before publishing.
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/rendezvous/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boot the production entrypoint. External HTTPS termination belongs to
      # the deployer's reverse proxy; this catches image/config regressions.
      - name: WebSocket image smoke test
        run: |
          set -euo pipefail
          TAG=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          mkdir -p .tmp-rzv
          printf '%s\n' 'ci-rendezvous-secret' > .tmp-rzv/jwt.key
          cat > .tmp-rzv/auth.json <<'JSON'
          {
            "jwt": {
              "algorithm": "HS256",
              "issuer": "ci",
              "audience": "ci-rzv",
              "verification_key": "/run/secrets/jwt.key"
            },
            "users": {
              "ci-user": {
                "client_to_server_bytes_per_sec": 1048576,
                "server_to_client_bytes_per_sec": 1048576,
                "burst_bytes": 65536
              }
            }
          }
          JSON
          chmod 755 .tmp-rzv
          chmod 644 .tmp-rzv/*
          docker run -d --name rzv-smoke -p 127.0.0.1:8765:8765 \
            -v "$PWD/.tmp-rzv:/run/secrets:ro" "$TAG"
          for i in $(seq 1 20); do
            curl --silent --fail \
              http://localhost:8765/health | grep -q '^ok$' && break
            sleep 0.5
          done
          curl --silent --fail \
            http://localhost:8765/health | grep -q '^ok$' \
            || { docker logs rzv-smoke; exit 1; }
          docker rm -f rzv-smoke

      # Re-run the build (gha-cached → near-instant) and push now it passed.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/rendezvous/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
