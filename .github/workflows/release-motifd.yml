name: release-motifd

# Build standalone Linux/macOS/Windows motifd binaries and upload them to the GitHub
# Release for the pushed tag. The production container workflow remains
# separate: this one is for users who want the raw daemon binary outside Docker.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: release-motifd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  LIBGHOSTTY_VT_SYS_OPTIMIZE: ReleaseFast

jobs:
  # Gate: on tag pushes, fail fast if the tag and pubspec version disagree
  # before spending build minutes. No-op on workflow_dispatch.
  check-version:
    uses: ./.github/workflows/version-check.yml

  build:
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: release-motifd-linux
            artifact: motifd-linux-x86_64
            verify_run: true
          - os: macos-15
            target: release-motifd-macos
            artifact: motifd-macos-arm64
            verify_run: true
          - os: windows-latest
            target: release-motifd-windows
            artifact: motifd-windows-x86_64
            verify_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: dtolnay/rust-toolchain@1.95
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake make pkg-config

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Build motifd artifact
        shell: bash
        run: make ${{ matrix.target }}

      - name: Verify motifd starts
        if: matrix.verify_run
        shell: bash
        run: |
          set -euo pipefail
          bin="$(find dist/release/motifd -type f \( -name 'motifd' -o -name 'motifd.exe' \) -print -quit)"
          test -n "$bin"
          "$bin" --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/motifd-*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: motifd-*
          merge-multiple: true

      - name: List release assets
        run: ls -l dist/release

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/release/motifd-*.tar.gz
          fail_on_unmatched_files: true
