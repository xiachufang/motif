name: Motif
options:
  bundleIdPrefix: io.allsunday
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.37.0"
  TalkerCommon:
    url: https://github.com/gfreezy/talkercommon.git
    from: "20260529.0.1"
  DoubaoASR:
    url: https://github.com/gfreezy/DoubaoASR.git
    from: "1.0.7"
  MessagePack:
    url: https://github.com/Flight-School/MessagePack.git
    from: "1.2.4"
  libghostty-spm:
    url: https://github.com/gfreezy/libghostty-spm.git
    from: "1.0.1780060391"

targets:
  Motif:
    type: application
    platform: iOS
    sources:
      - path: Motif
        excludes:
          - "Info.plist"
          - "Motif.entitlements"
    # Push Notifications + App Groups. The App Group is shared with the
    # MotifNotifyService extension and doubles as the keychain access group
    # (iOS treats every App Group as one of your keychain access groups), so the
    # extension can read the per-device AES key and decrypt payloads on device.
    # A dedicated keychain-sharing group was tried but securityd refused it at
    # runtime (errSecMissingEntitlement); the App Group is honored reliably.
    # Use "production" for aps-environment in App Store / TestFlight builds.
    entitlements:
      path: Motif/Motif.entitlements
      properties:
        # Driven by MOTIF_APS_ENV (development in Debug, production in Release)
        # so the token's APNs world always matches PushManager's #if DEBUG hint.
        # Expanded at code-signing time.
        aps-environment: $(MOTIF_APS_ENV)
        com.apple.security.application-groups:
          - group.io.allsunday.motif
    info:
      path: Motif/Info.plist
      properties:
        CFBundleDisplayName: Motif
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Motif needs microphone to recognize your voice commands."
        NSAppTransportSecurity:
          # Do NOT combine with NSAllowsLocalNetworking — on iOS 10+ that
          # key causes NSAllowsArbitraryLoads to be ignored (Apple docs).
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.allsunday.motif
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: UWNR93L682
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Binds the app-wide accent (Color.accentColor, default `.tint`) to the
        # brand colorset so untinted system controls (Pickers, NavigationLinks,
        # Form chevrons) pick up the warm amber instead of system blue.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: MotifAccent
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/vendor
        OTHER_LDFLAGS:
          - "-ObjC"
        # APNs environment, matched to the build config (and thus to
        # PushManager's #if DEBUG hint). Drives aps-environment in the
        # entitlements above.
        MOTIF_APS_ENV: development
      configs:
        Release:
          MOTIF_APS_ENV: production
    dependencies:
      - framework: vendor/TailscaleKit.xcframework
        embed: true
        codeSign: true
      - package: SwiftProtobuf
      - package: TalkerCommon
        product: TalkerCommon
      - package: TalkerCommon
        product: TalkerCommonLogging
      - package: TalkerCommon
        product: TalkerMacro
      - package: DoubaoASR
      - package: MessagePack
      - package: libghostty-spm
        product: GhosttyTerminal
      # Embeds the notification service extension into the app bundle.
      - target: MotifNotifyService

  # Notification Service Extension: decrypts E2E-encrypted push payloads on
  # device before they're shown (the only iOS hook that runs between APNs
  # delivery and display when the app is backgrounded/killed). Shares the App
  # Group + Keychain group with the app to read the per-device AES key.
  MotifNotifyService:
    type: app-extension
    platform: iOS
    sources:
      - path: MotifNotifyService
        excludes:
          - "MotifNotifyService.entitlements"
    entitlements:
      path: MotifNotifyService/MotifNotifyService.entitlements
      properties:
        # App Group, shared with the app; also serves as the keychain access
        # group for reading the per-device AES key (see the app target note).
        com.apple.security.application-groups:
          - group.io.allsunday.motif
    info:
      path: MotifNotifyService/Info.plist
      properties:
        CFBundleDisplayName: MotifNotifyService
        # Must match the parent app's version exactly, else the build's
        # embedded-extension validation fails ("CFBundleShortVersionString of
        # an app extension must match that of its containing parent app").
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.allsunday.motif.MotifNotifyService
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: UWNR93L682

  MotifTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MotifTests
    dependencies:
      - target: Motif
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Motif.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Motif"
