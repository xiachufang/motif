name: Motif
options:
  bundleIdPrefix: io.allsunday
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.37.0"
  TalkerCommon:
    url: https://github.com/gfreezy/talkercommon.git
    from: "20260505.0.3"
  TalkerMacro:
    url: https://github.com/gfreezy/talkermacro.git
    from: "20241210.1.3"
  DoubaoASR:
    url: https://github.com/gfreezy/DoubaoASR.git
    from: "1.0.6"
  MessagePack:
    url: https://github.com/Flight-School/MessagePack.git
    from: "1.2.4"
  libghostty-spm:
    url: https://github.com/gfreezy/libghostty-spm.git
    from: "1.0.1779949513"

targets:
  Motif:
    type: application
    platform: iOS
    sources:
      - path: Motif
        excludes:
          - "Info.plist"
    info:
      path: Motif/Info.plist
      properties:
        CFBundleDisplayName: Motif
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Motif needs microphone to recognize your voice commands."
        NSAppTransportSecurity:
          # Do NOT combine with NSAllowsLocalNetworking — on iOS 10+ that
          # key causes NSAllowsArbitraryLoads to be ignored (Apple docs).
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.allsunday.motif
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: UWNR93L682
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/vendor
        OTHER_LDFLAGS:
          - "-ObjC"
    dependencies:
      - framework: vendor/TailscaleKit.xcframework
        embed: true
        codeSign: true
      - package: SwiftProtobuf
      - package: TalkerCommon
        product: TalkerCommon
      - package: TalkerMacro
        product: TalkerMacro
      - package: DoubaoASR
      - package: MessagePack
      - package: libghostty-spm
        product: GhosttyTerminal

  MotifTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MotifTests
    dependencies:
      - target: Motif
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Motif.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Motif"
