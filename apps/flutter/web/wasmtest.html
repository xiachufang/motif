<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>ghostty-vt wasm browser test</title></head>
<body>
<pre id="out">RESULT:RUNNING</pre>
<script src="ghostty_vt.js"></script>
<script>
(async () => {
  const out = document.getElementById('out');
  try {
    const ok = await window.GhosttyVt.ready;
    if (!ok) { out.textContent = 'RESULT:FAIL:wasm-not-ready'; return; }
    const t = window.GhosttyVt.newTerminal(80, 24);
    // Plain text + an SGR red run ("RED") to verify color extraction.
    const text = 'hello world\r\nsecond line\r\n\x1b[31mRED\x1b[0m plain';
    const bytes = new Uint8Array([...text].map(c => c.charCodeAt(0)));
    window.GhosttyVt.write(t, bytes);
    const grid = window.GhosttyVt.gridText(t);
    const textOk = grid.includes('hello world') && grid.includes('second line') && grid.includes('RED');
    // Color check: find the run containing "RED" and confirm its fg is reddish.
    const data = JSON.parse(window.GhosttyVt.gridCellsJson(t));
    let redRun = null;
    for (const row of data.rows) for (const run of row) if (run.t.includes('RED')) redRun = run;
    const colorOk = !!redRun && redRun.f[0] > 150 && redRun.f[1] < 120 && redRun.f[2] < 120;
    const cur = data.cursor || {};
    const cursorOk = cur.vis === true && cur.y >= 0 && cur.x >= 0;
    const scrollTerm = window.GhosttyVt.newTerminal(12, 3);
    const scrollText = Array.from({length: 12}, (_, i) => 'line' + i).join('\r\n');
    window.GhosttyVt.write(
      scrollTerm,
      new Uint8Array([...scrollText].map(c => c.charCodeAt(0))),
    );
    const bottomMetrics = JSON.parse(
      window.GhosttyVt.scrollbarMetricsJson(scrollTerm),
    );
    window.GhosttyVt.scrollToOffset(scrollTerm, 0);
    const topData = JSON.parse(window.GhosttyVt.gridCellsJson(scrollTerm));
    window.GhosttyVt.write(
      scrollTerm,
      new Uint8Array([...'\r\nnew-output'].map(c => c.charCodeAt(0))),
    );
    const preservedMetrics = JSON.parse(
      window.GhosttyVt.scrollbarMetricsJson(scrollTerm),
    );
    window.GhosttyVt.scroll(scrollTerm, 2);
    const deltaMetrics = JSON.parse(
      window.GhosttyVt.scrollbarMetricsJson(scrollTerm),
    );
    window.GhosttyVt.scrollToBottom(scrollTerm);
    const restoredMetrics = JSON.parse(
      window.GhosttyVt.scrollbarMetricsJson(scrollTerm),
    );
    window.GhosttyVt.resize(scrollTerm, 12, 4, 8, 16);
    const resizedMetrics = JSON.parse(
      window.GhosttyVt.scrollbarMetricsJson(scrollTerm),
    );
    const initialMaxOffset = bottomMetrics.total - bottomMetrics.len;
    const currentMaxOffset = preservedMetrics.total - preservedMetrics.len;
    const scrollOk = initialMaxOffset > 0 &&
      bottomMetrics.offset === initialMaxOffset &&
      topData.scrollbar.offset === 0 &&
      topData.alternateScreenActive === false &&
      preservedMetrics.offset === 0 &&
      preservedMetrics.offset < currentMaxOffset &&
      deltaMetrics.offset === 2 &&
      restoredMetrics.offset === currentMaxOffset &&
      resizedMetrics.len === 4 &&
      resizedMetrics.offset === resizedMetrics.total - resizedMetrics.len;
    const inputTerm = window.GhosttyVt.newTerminal(80, 24);
    const hex = bytes => Array.from(bytes, byte =>
      byte.toString(16).padStart(2, '0')).join('');
    const normalUp = hex(
      window.GhosttyVt.encodeKey(inputTerm, 78, 1, 0, null, 0),
    );
    const unicodeText = hex(
      window.GhosttyVt.encodeKey(inputTerm, 0, 1, 0, '中', 0),
    );
    window.GhosttyVt.write(
      inputTerm,
      new Uint8Array([0x1b, 0x5b, 0x3f, 0x31, 0x68]),
    );
    const applicationUp = hex(
      window.GhosttyVt.encodeKey(inputTerm, 78, 1, 0, null, 0),
    );
    const plainPaste = hex(
      window.GhosttyVt.encodePaste(
        inputTerm,
        new TextEncoder().encode('a\nb'),
      ),
    );
    window.GhosttyVt.write(
      inputTerm,
      new Uint8Array([0x1b, 0x5b, 0x3f, 0x32, 0x30, 0x30, 0x34, 0x68]),
    );
    const bracketedPaste = hex(
      window.GhosttyVt.encodePaste(
        inputTerm,
        new TextEncoder().encode('a\nb'),
      ),
    );
    const inputOk = normalUp === '1b5b41' &&
      unicodeText === 'e4b8ad' &&
      applicationUp === '1b4f41' &&
      plainPaste === '610d62' &&
      bracketedPaste === '1b5b3230307e610a621b5b3230317e';
    const pass = textOk && colorOk && cursorOk && scrollOk && inputOk;
    out.textContent = (pass ? 'RESULT:PASS' : 'RESULT:FAIL') +
      '\ntextOk=' + textOk + ' colorOk=' + colorOk + ' cursorOk=' + cursorOk +
      ' scrollOk=' + scrollOk + ' inputOk=' + inputOk +
      ' cursor=' + JSON.stringify(cur) +
      ' redFg=' + (redRun ? JSON.stringify(redRun.f) : 'none') +
      ' scrollbar=' + JSON.stringify(resizedMetrics) +
      '\n--GRID--\n' + grid;
  } catch (e) {
    out.textContent = 'RESULT:ERROR:' + (e && e.message || e);
  }
})();
</script>
</body>
</html>
