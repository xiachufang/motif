name: Motif
options:
  bundleIdPrefix: io.allsunday
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.37.0"

targets:
  Motif:
    type: application
    platform: iOS
    sources:
      - path: Motif
        excludes:
          - "Resources/web"
          - "Resources/web/**"
          - "Info.plist"
          - "ASR/Asr.proto"
      - path: Motif/Resources/web
        type: folder
        buildPhase: resources
    info:
      path: Motif/Info.plist
      properties:
        CFBundleDisplayName: Motif
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Motif 需要使用麦克风来识别您的语音指令。"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.allsunday.motif
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: UWNR93L682
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/vendor
        OTHER_LDFLAGS:
          - "-ObjC"
    dependencies:
      - framework: vendor/TailscaleKit.xcframework
        embed: true
        codeSign: true
      - framework: vendor/Opus.xcframework
        embed: false
        link: true
      - package: SwiftProtobuf

  MotifTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MotifTests
    dependencies:
      - target: Motif
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Motif.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Motif"
